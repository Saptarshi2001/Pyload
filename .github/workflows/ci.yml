name: testing,build and push

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout test code
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH=. pytest tests/
        env:  
            DATABASE_URL: load.db
            timeout: 0 
            LOGTAIL_TOKEN: ${{secrets.LOGTAIL_TOKEN}}
            LOGTAIL_URL: ${{secrets.LOGTAIL_URL}}
    
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name=='push' && github.ref=='refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{github.actor}}
        password: ${{secrets.GITHUB_TOKEN}}
    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/saptarshi2001/loadtester:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  run-loadtester:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build and run container
      run: |
        docker build -t loadtester .
        docker run --rm loadtester python pyload.py -u httpbin.org -n 10 -c 5 -GET
      env:
        DATABASE_URL: /tmp/load.db
        timeout: 30
        LOGTAIL_TOKEN: ${{ secrets.LOGTAIL_TOKEN }}
        LOGTAIL_URL: ${{ secrets.LOGTAIL_URL }}